output_dir: "./output/paper_repro"

evaluation:
  backend: "numpy"
  signal_failure_policy: "reject"

benchmark:
  mode: "paper"

data:
  targets:
    - name: "paper"
      entry_delay_bars: 1
      holding_bars: 1
      price_pair: "open_to_close"
      return_transform: "simple"
  default_target: "paper"

research:
  enabled: false

phase2:
  causal:
    enabled: false
  regime:
    enabled: false
  capacity:
    enabled: false
  significance:
    enabled: false
  debate:
    enabled: false
  auto_inventor:
    enabled: false
  helix:
    enabled: false
