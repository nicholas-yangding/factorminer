output_dir: "./output/benchmark_full"

evaluation:
  backend: "numpy"
  signal_failure_policy: "reject"

benchmark:
  mode: "paper"
  baselines:
    - "alpha101_classic"
    - "alpha101_adapted"
    - "random_exploration"
    - "gplearn"
    - "alphaforge_style"
    - "alphaagent_style"
    - "factor_miner"
    - "factor_miner_no_memory"

data:
  targets:
    - name: "paper"
      entry_delay_bars: 1
      holding_bars: 1
      price_pair: "open_to_close"
      return_transform: "simple"
  default_target: "paper"

research:
  enabled: false

phase2:
  causal:
    enabled: false
  regime:
    enabled: false
  capacity:
    enabled: false
  significance:
    enabled: false
  debate:
    enabled: false
  auto_inventor:
    enabled: false
  helix:
    enabled: false
